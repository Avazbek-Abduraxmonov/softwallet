<!DOCTYPE html>
<html lang="uz">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Soft Wallet | To'ldirish</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Cormorant+Garamond:wght@600&display=swap" rel="stylesheet">
  <style>
    /* Asosiy CSS o'zgaruvchilari va reset */
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent }
    :root {
      --bg: #080b12; --bg2: #0d1017; --card: #0f1318; --card2: #161b24;
      --border: rgba(255, 255, 255, 0.055); --border2: rgba(255, 255, 255, 0.1);
      --text: #e4e7f2; --text2: #6e7487; --text3: #3d4257;
      --ton: #0098EA; --ton2: #2db8ff; --ton-dim: rgba(0, 152, 234, 0.13);
      --sw: 220px;
    }

    html, body { height: 100%; overflow: hidden; background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text) }
    .app { display: flex; width: 100vw; height: 100dvh; overflow: hidden }

    /* Sidebar va Topbar (Desktop) */
    .sidebar { width: var(--sw); flex-shrink: 0; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
    .sl-logo { padding: 26px 18px; display: flex; align-items: center; gap: 11px; border-bottom: 1px solid var(--border); }
    .sl-logo-txt { font-family: 'Cormorant Garamond', serif; font-size: 19px; font-weight: 600; background: linear-gradient(130deg, #fff 20%, #2db8ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .si { display: flex; align-items: center; gap: 11px; padding: 12px 13px; border-radius: 12px; cursor: pointer; text-decoration: none; color: var(--text3); font-size: 14px; transition: 0.15s; }
    .si:hover { background: rgba(255, 255, 255, 0.04); color: var(--text2); }
    .si svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.6; }
    
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .content { flex: 1; overflow-y: auto; padding: 24px; padding-bottom: 100px; }

    /* Deposit Card Styles */
    .dep-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      text-align: center;
      margin-top: 10px;
    }

    .qr-box {
      width: 180px;
      height: 180px;
      background: white;
      margin: 0 auto 20px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }

    .qr-box img { width: 100%; height: 100%; }

    .addr-box {
      background: var(--bg);
      border: 1px solid var(--border2);
      padding: 14px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .addr-txt {
      font-size: 13px;
      color: var(--text2);
      word-break: break-all;
      text-align: left;
      margin-right: 10px;
    }

    .copy-btn {
      background: var(--ton-dim);
      border: none;
      color: var(--ton2);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }

    .hint {
      font-size: 12px;
      color: var(--text3);
      line-height: 1.5;
    }

    /* Bottom Nav */
    .bnav { position: fixed; bottom: 0; left: 0; right: 0; height: 68px; background: rgba(8, 11, 18, .95); backdrop-filter: blur(24px); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 200; }
    .ntab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; text-decoration: none; color: var(--text3); }
    .ntab svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.5; }
    .ntab.active { color: var(--ton); }
    .nt-lbl { font-size: 11px; font-weight: 600; }

    /* Toast */
    .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: var(--card2); border: 1px solid var(--border2); color: #fff; padding: 12px 24px; border-radius: 100px; z-index: 9999; transition: 0.3s; }
    .toast.show { transform: translateX(-50%) translateY(0); }

    @media(max-width:767px) { .sidebar { display: none; } }
    @media(min-width:768px) { .bnav { display: none; } }
  </style>
</head>

<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sl-logo">
        <span class="sl-logo-txt">Soft Wallet</span>
      </div>
      <nav style="padding: 10px; flex: 1;">
        <a href="index.html" class="si"><svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/></svg>Asosiy</a>
        <a href="kartalar.html" class="si"><svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/></svg>Kartam</a>
        <a href="stake.html" class="si"><svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>Stake</a>
      </nav>
    </aside>

    <div class="main">
      <div class="content">
        <h2 style="margin-bottom: 20px; font-size: 20px;">TON To'ldirish</h2>
        
        <div class="dep-card">
          <div class="qr-box">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=UQB_YOUR_TON_ADDRESS_HERE" alt="QR">
          </div>
          
          <div class="addr-box">
            <span class="addr-txt" id="addr">UQB_example_address_12345_soft_wallet</span>
            <button class="copy-btn" onclick="copyAddr()">Nusxa</button>
          </div>
          
          <p class="hint">
            Faqat <b>TON Network</b> tarmog'i orqali yuboring.<br>
            Minimal depozit: 0.1 TON
          </p>
        </div>
      </div>

      <nav class="bnav">
        <a href="index.html" class="ntab"><svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/></svg><span class="nt-lbl">Asosiy</span></a>
        <a href="kartalar.html" class="ntab"><svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/></svg><span class="nt-lbl">Kartam</span></a>
        <a href="stake.html" class="ntab"><svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg><span class="nt-lbl">Stake</span></a>
        <a href="tarix.html" class="ntab"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span class="nt-lbl">Tarix</span></a>
      </nav>
    </div>
  </div>

  <div class="toast" id="toastEl"></div>

  <script>
    function copyAddr() {
      const addr = document.getElementById('addr').textContent;
      navigator.clipboard.writeText(addr);
      showToast('✅ Manzil nusxalandi');
    }

    function showToast(msg) {
      const el = document.getElementById('toastEl');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2000);
    }
  </script>
</body>
</html>
