<!DOCTYPE html>
<html lang="uz">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Soft Wallet | Asosiy</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Cormorant+Garamond:wght@400;500;600&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent
    }

    :root {
      --bg: #080b12;
      --bg2: #0d1017;
      --bg3: #131720;
      --card: #0f1318;
      --card2: #161b24;
      --card3: #1c2230;
      --border: rgba(255, 255, 255, 0.055);
      --border2: rgba(255, 255, 255, 0.1);
      --text: #e4e7f2;
      --text2: #6e7487;
      --text3: #3d4257;
      --ton: #0098EA;
      --ton2: #2db8ff;
      --ton-dim: rgba(0, 152, 234, 0.13);
      --ton-glow: rgba(0, 152, 234, 0.28);
      --green: #18b872;
      --green-dim: rgba(24, 184, 114, 0.12);
      --rose: #e8445a;
      --rose-dim: rgba(232, 68, 90, 0.12);
      --amber: #e89c28;
      --amber-dim: rgba(232, 156, 40, 0.12);
      --violet: #7060e0;
      --sw: 220px;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text)
    }

    .app {
      display: flex;
      width: 100vw;
      height: 100dvh;
      overflow: hidden
    }

    /* ══ SIDEBAR ══ */
    .sidebar {
      width: var(--sw);
      flex-shrink: 0;
      height: 100%;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden
    }

    .sl-logo {
      padding: clamp(16px, 2.5vh, 26px) 18px clamp(14px, 2vh, 22px);
      display: flex;
      align-items: center;
      gap: 11px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0
    }

    .sl-logo-txt {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(16px, 1.3vw, 19px);
      font-weight: 600;
      background: linear-gradient(130deg, #fff 20%, #2db8ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text
    }

    .sl-nav {
      flex: 1;
      padding: clamp(8px, 1.2vh, 14px) 10px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      overflow-y: auto
    }

    .sl-nav::-webkit-scrollbar {
      display: none
    }

    .si {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: clamp(9px, 1.1vh, 12px) 13px;
      border-radius: 12px;
      cursor: pointer;
      background: none;
      border: none;
      width: 100%;
      text-align: left;
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(13px, 1vw, 14px);
      font-weight: 500;
      color: var(--text3);
      transition: background .15s, color .15s
    }

    .si:hover {
      background: rgba(255, 255, 255, 0.04);
      color: var(--text2)
    }

    .si.active {
      background: var(--ton-dim);
      color: var(--ton2)
    }

    .si svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.6;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0
    }

    .sl-foot {
      padding: clamp(10px, 1.5vh, 16px) 10px clamp(12px, 2vh, 22px);
      border-top: 1px solid var(--border);
      flex-shrink: 0
    }

    .sl-ver {
      font-size: 11px;
      color: var(--text3);
      text-align: center;
      padding-top: 8px
    }

    /* ══ MAIN ══ */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0
    }

    /* ══ TOPBAR ══ */
    .topbar {
      height: clamp(48px, 6.5vh, 60px);
      padding: 0 clamp(16px, 2.5vw, 32px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--bg)
    }

    .tb-title {
      font-size: clamp(14px, 1.2vw, 17px);
      font-weight: 700;
      color: var(--text)
    }

    .tb-right {
      display: flex;
      align-items: center;
      gap: 10px
    }

    .tb-bal {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--ton-dim);
      border: 1px solid rgba(0, 152, 234, 0.2);
      padding: clamp(5px, 0.7vh, 7px) clamp(12px, 1.3vw, 16px);
      border-radius: 20px
    }

    .tb-bal-lbl {
      font-size: clamp(10px, 0.8vw, 11px);
      color: var(--text3)
    }

    .tb-bal-amt {
      font-size: clamp(12px, 1vw, 14px);
      font-weight: 700;
      color: var(--ton2)
    }

    .ibell {
      width: clamp(32px, 3.5vw, 38px);
      height: clamp(32px, 3.5vw, 38px);
      border-radius: 11px;
      background: var(--card);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      transition: background .15s;
      flex-shrink: 0
    }

    .ibell:hover {
      background: var(--card2)
    }

    .ibell svg {
      width: 16px;
      height: 16px;
      stroke: var(--text2);
      fill: none;
      stroke-width: 1.6;
      stroke-linecap: round;
      stroke-linejoin: round
    }

    .ndot {
      position: absolute;
      top: 7px;
      right: 7px;
      width: 6px;
      height: 6px;
      background: var(--ton);
      border-radius: 50%;
      border: 1.5px solid var(--bg)
    }

    /* ══ CONTENT ══ */
    .content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: clamp(14px, 2.2vh, 26px) clamp(14px, 2.2vw, 32px) clamp(80px, 10vh, 100px);
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent
    }

    .content::-webkit-scrollbar {
      width: 4px
    }

    .content::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 4px
    }

    .mob-hdr {
      padding: clamp(10px, 1.5vh, 14px) 0 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      margin-bottom: clamp(16px, 2.5vh, 24px)
    }

    /* ══ BOTTOM NAV ══ */
    .bnav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: clamp(58px, 8vh, 68px);
      background: rgba(8, 11, 18, .95);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 0 4px env(safe-area-inset-bottom, 0px);
      z-index: 200
    }

    .ntab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 4px;
      cursor: pointer;
      background: none;
      border: none;
      position: relative;
      transition: opacity .15s;
      text-decoration: none;
      color: inherit
    }

    .ntab:active {
      opacity: .5
    }

    .ntab svg {
      width: clamp(19px, 2.8vw, 22px);
      height: clamp(19px, 2.8vw, 22px);
      stroke: var(--text3);
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke .18s
    }

    .ntab.active svg {
      stroke: var(--ton)
    }

    .nt-lbl {
      font-size: clamp(9px, 1.5vw, 11px);
      font-weight: 600;
      color: var(--text3);
      transition: color .18s;
      font-family: 'DM Sans', sans-serif
    }

    .ntab.active .nt-lbl {
      color: var(--ton)
    }

    .ntab.active::before {
      content: '';
      position: absolute;
      top: 0;
      width: 18px;
      height: 2px;
      background: var(--ton);
      border-radius: 2px
    }

    /* ══ RESPONSIVE ══ */
    @media(max-width:767px) {

      .sidebar,
      .topbar {
        display: none
      }

      .bnav {
        display: flex
      }

      .content {
        padding-bottom: calc(clamp(58px, 8vh, 68px) + 16px + env(safe-area-inset-bottom, 0px))
      }
    }

    @media(min-width:768px) {
      .sidebar {
        display: flex
      }

      .topbar {
        display: flex
      }

      .bnav {
        display: none
      }

      .mob-hdr {
        display: none
      }
    }

    @media(min-width:1440px) {
      :root {
        --sw: 250px
      }
    }

    /* ══ HOME PAGE STYLES ══ */
    .hero {
      border-radius: clamp(14px, 1.8vw, 22px);
      padding: clamp(16px, 2.8vh, 26px) clamp(16px, 2.2vw, 24px);
      position: relative;
      overflow: hidden;
      background: linear-gradient(145deg, #071526 0%, #091c35 50%, #060e1a 100%);
      border: 1px solid rgba(0, 152, 234, 0.16);
      margin-bottom: clamp(12px, 2vh, 20px)
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -60px;
      right: -40px;
      width: clamp(140px, 18vw, 200px);
      height: clamp(140px, 18vw, 200px);
      background: radial-gradient(circle, rgba(0, 152, 234, 0.14) 0%, transparent 65%);
      pointer-events: none
    }

    .hero-lbl {
      font-size: clamp(9px, 0.8vw, 11px);
      font-weight: 600;
      color: rgba(255, 255, 255, .28);
      letter-spacing: 1.8px;
      text-transform: uppercase;
      margin-bottom: clamp(5px, 0.8vh, 9px)
    }

    .hero-amt {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(34px, 5vw, 58px);
      font-weight: 500;
      line-height: 1;
      letter-spacing: -2px;
      color: #fff;
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: clamp(3px, 0.5vh, 6px)
    }

    .hero-cur {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(13px, 1.2vw, 17px);
      font-weight: 600;
      color: var(--ton2);
      opacity: .82
    }

    .hero-usd {
      font-size: clamp(11px, 0.9vw, 13px);
      color: rgba(255, 255, 255, .24);
      margin-bottom: clamp(12px, 1.8vh, 20px)
    }

    .hero-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(8px, 1vw, 12px)
    }

    .hst {
      background: rgba(255, 255, 255, .04);
      border: 1px solid rgba(255, 255, 255, .05);
      border-radius: clamp(9px, 1vw, 13px);
      padding: clamp(9px, 1.2vh, 13px) clamp(10px, 1.2vw, 15px)
    }

    .hst-l {
      font-size: clamp(9px, 0.78vw, 11px);
      color: rgba(255, 255, 255, .26);
      margin-bottom: 3px
    }

    .hst-v {
      font-size: clamp(12px, 1vw, 14px);
      font-weight: 700
    }

    .hst-v.g {
      color: var(--green)
    }

    .hst-v.r {
      color: var(--rose)
    }

    .qa {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: clamp(8px, 1vw, 14px);
      margin-bottom: clamp(14px, 2.5vh, 24px)
    }

    .qb {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(5px, 0.7vh, 8px);
      cursor: pointer
    }

    .qb:active .qi {
      transform: scale(.88)
    }

    .qi {
      width: clamp(44px, 5.5vw, 58px);
      height: clamp(44px, 5.5vw, 58px);
      border-radius: clamp(13px, 1.5vw, 17px);
      background: var(--card);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .14s, background .14s
    }

    .qi:hover {
      background: var(--card2)
    }

    .qi svg {
      width: clamp(17px, 2vw, 21px);
      height: clamp(17px, 2vw, 21px);
      stroke-width: 1.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round
    }

    .ql {
      font-size: clamp(10px, 0.82vw, 12px);
      font-weight: 500;
      color: var(--text2)
    }

    .sh {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: clamp(14px, 2.2vh, 26px) 0 clamp(9px, 1.3vh, 14px)
    }

    .st {
      font-size: clamp(13px, 1.1vw, 15px);
      font-weight: 700;
      color: var(--text)
    }

    .sl-l {
      font-size: clamp(11px, 0.9vw, 13px);
      color: var(--ton2);
      font-weight: 500;
      cursor: pointer;
      transition: opacity .15s;
      text-decoration: none
    }

    .sl-l:hover {
      opacity: .7
    }

    .wcard {
      width: 100%;
      height: clamp(138px, 18vh, 182px);
      border-radius: clamp(14px, 1.8vw, 22px);
      padding: clamp(14px, 2vh, 20px) clamp(16px, 1.8vw, 22px);
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: transform .2s;
      background: linear-gradient(145deg, #050d1f 0%, #0a1836 40%, #0c1e4a 70%, #07112a 100%);
      border: 1px solid rgba(0, 152, 234, 0.2)
    }

    .wcard:hover {
      transform: translateY(-2px)
    }

    .wcard:active {
      transform: scale(.98)
    }

    .wcard::before {
      content: '';
      position: absolute;
      top: -40px;
      right: -40px;
      width: clamp(100px, 13vw, 155px);
      height: clamp(100px, 13vw, 155px);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.045)
    }

    .wcard::after {
      content: '';
      position: absolute;
      bottom: -40px;
      left: -20px;
      width: clamp(90px, 11vw, 135px);
      height: clamp(90px, 11vw, 135px);
      border-radius: 50%;
      background: rgba(0, 152, 234, 0.04)
    }

    .wc-lbl {
      font-size: clamp(9px, 0.78vw, 10px);
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #fff;
      opacity: .42
    }

    .wc-bal {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(26px, 3.8vw, 44px);
      font-weight: 500;
      letter-spacing: -1px;
      margin: clamp(5px, 0.8vh, 9px) 0 clamp(7px, 1.1vh, 13px);
      color: #fff;
      position: relative;
      z-index: 1
    }

    .wc-num {
      font-size: clamp(10px, 0.88vw, 12px);
      letter-spacing: 3px;
      font-weight: 500;
      color: #fff;
      opacity: .38;
      position: relative;
      z-index: 1
    }

    .wc-logo {
      position: absolute;
      bottom: clamp(10px, 1.4vh, 16px);
      right: clamp(12px, 1.4vw, 18px);
      z-index: 2;
      opacity: .6
    }

    .toast {
      position: fixed;
      top: clamp(14px, 2.5vh, 22px);
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: var(--card2);
      border: 1px solid var(--border2);
      color: var(--text);
      font-size: clamp(12px, 1vw, 13px);
      font-weight: 500;
      padding: clamp(9px, 1.2vh, 12px) clamp(16px, 2vw, 22px);
      border-radius: 100px;
      z-index: 9999;
      white-space: nowrap;
      transition: transform .3s cubic-bezier(.32, .72, 0, 1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, .5)
    }

    .toast.show {
      transform: translateX(-50%) translateY(0)
    }
  </style>
</head>

      <!-- CONTENT -->
      <div class="content">
        <!-- Mobile header -->

            <path d="M21 7L30 13.5L21 23L12 13.5L21 7Z" fill="rgba(0,152,234,0.18)" stroke="#2db8ff" stroke-width="1.2"

  <script>
    const fTON = n => parseFloat(n).toFixed(2);
    const TICLS = { in: 'g', out: 'r', tr: 'b' };
    const ICONS = {
      in: `<svg viewBox="0 0 24 24"><polyline points="17 11 12 6 7 11"/><line x1="12" y1="18" x2="12" y2="6"/></svg>`,
      out: `<svg viewBox="0 0 24 24"><polyline points="7 13 12 18 17 13"/><line x1="12" y1="6" x2="12" y2="18"/></svg>`,
      tr: `<svg viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>`,
    };

    // Update UI
    document.getElementById('hBal').textContent = fTON(S.balance);
    document.getElementById('hUsd').textContent = (S.balance * S.tonRate).toFixed(2);
    document.getElementById('hInc').textContent = '+' + fTON(S.income) + ' TON';
    document.getElementById('hExp').textContent = '−' + fTON(S.expense) + ' TON';
    document.getElementById('tb-bal').textContent = fTON(S.balance) + ' TON';

    // Render recent transactions (first 3)
    const recentContainer = document.getElementById('recent-txns');
    recentContainer.innerHTML = S.txns.slice(0, 3).map(tx => `
  <div class="txn" style="margin-bottom:4px">
    <div class="ti ${TICLS[tx.t]}">${ICONS[tx.t]}</div>
    <div class="txn-info">
      <div class="txn-nm">${tx.name}</div>
      <div class="txn-dt">${tx.desc}</div>
    </div>
    <div>
      <div class="txn-amt ${tx.t === 'in' ? 'pos' : tx.t === 'out' ? 'neg' : 'neu'}">${tx.t === 'in' ? '+' : '−'}${fTON(tx.amt)} TON</div>
      <div class="txn-sub">≈$${(tx.amt * S.tonRate).toFixed(2)}</div>
    </div>
  </div>
`).join('');

    let _tt;
    function toast(msg) {
      clearTimeout(_tt);
      const el = document.getElementById('toastEl');
      el.textContent = msg;
      el.classList.add('show');
      _tt = setTimeout(() => el.classList.remove('show'), 2800);
    }
  </script>
