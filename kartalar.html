<!DOCTYPE html>
<html lang="uz">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Soft Wallet | Kartalar</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Cormorant+Garamond:wght@400;500;600&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent
    }

    :root {
      --bg: #080b12;
      --bg2: #0d1017;
      --bg3: #131720;
      --card: #0f1318;
      --card2: #161b24;
      --card3: #1c2230;
      --border: rgba(255, 255, 255, 0.055);
      --border2: rgba(255, 255, 255, 0.1);
      --text: #e4e7f2;
      --text2: #6e7487;
      --text3: #3d4257;
      --ton: #0098EA;
      --ton2: #2db8ff;
      --ton-dim: rgba(0, 152, 234, 0.13);
      --green: #18b872;
      --green-dim: rgba(24, 184, 114, 0.12);
      --rose: #e8445a;
      --violet: #7060e0;
      --sw: 220px;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text)
    }

    .app {
      display: flex;
      width: 100vw;
      height: 100dvh;
      overflow: hidden
    }

    /* Sidebar (xuddi index.html dagi kabi) */
    .sidebar {
      width: var(--sw);
      flex-shrink: 0;
      height: 100%;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden
    }

    .sl-logo {
      padding: clamp(16px, 2.5vh, 26px) 18px clamp(14px, 2vh, 22px);
      display: flex;
      align-items: center;
      gap: 11px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0
    }

    .sl-logo-txt {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(16px, 1.3vw, 19px);
      font-weight: 600;
      background: linear-gradient(130deg, #fff 20%, #2db8ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text
    }

    .sl-nav {
      flex: 1;
      padding: clamp(8px, 1.2vh, 14px) 10px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      overflow-y: auto
    }

    .sl-nav::-webkit-scrollbar {
      display: none
    }

    .si {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: clamp(9px, 1.1vh, 12px) 13px;
      border-radius: 12px;
      cursor: pointer;
      background: none;
      border: none;
      width: 100%;
      text-align: left;
      font-size: clamp(13px, 1vw, 14px);
      font-weight: 500;
      color: var(--text3);
      text-decoration: none;
      transition: background .15s, color .15s
    }

    .si:hover {
      background: rgba(255, 255, 255, 0.04);
      color: var(--text2)
    }

    .si.active {
      background: var(--ton-dim);
      color: var(--ton2)
    }

    .si svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.6;
      flex-shrink: 0
    }

    .sl-foot {
      padding: clamp(10px, 1.5vh, 16px) 10px clamp(12px, 2vh, 22px);
      border-top: 1px solid var(--border);
      flex-shrink: 0
    }

    .sl-ver {
      font-size: 11px;
      color: var(--text3);
      text-align: center;
      padding-top: 8px
    }

    /* Main */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0
    }

    .topbar {
      height: clamp(48px, 6.5vh, 60px);
      padding: 0 clamp(16px, 2.5vw, 32px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--bg)
    }

    .tb-title {
      font-size: clamp(14px, 1.2vw, 17px);
      font-weight: 700;
      color: var(--text)
    }

    .tb-right {
      display: flex;
      align-items: center;
      gap: 10px
    }

    .tb-bal {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--ton-dim);
      border: 1px solid rgba(0, 152, 234, 0.2);
      padding: clamp(5px, 0.7vh, 7px) clamp(12px, 1.3vw, 16px);
      border-radius: 20px
    }

    .tb-bal-lbl {
      font-size: clamp(10px, 0.8vw, 11px);
      color: var(--text3)
    }

    .tb-bal-amt {
      font-size: clamp(12px, 1vw, 14px);
      font-weight: 700;
      color: var(--ton2)
    }

    .ibell {
      width: clamp(32px, 3.5vw, 38px);
      height: clamp(32px, 3.5vw, 38px);
      border-radius: 11px;
      background: var(--card);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      flex-shrink: 0
    }

    .ibell svg {
      width: 16px;
      height: 16px;
      stroke: var(--text2);
      fill: none
    }

    .ndot {
      position: absolute;
      top: 7px;
      right: 7px;
      width: 6px;
      height: 6px;
      background: var(--ton);
      border-radius: 50%;
      border: 1.5px solid var(--bg)
    }

    /* Content */
    .content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: clamp(14px, 2.2vh, 26px) clamp(14px, 2.2vw, 32px) clamp(80px, 10vh, 100px)
    }

    .content::-webkit-scrollbar {
      width: 4px
    }

    .content::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 4px
    }

    .mob-hdr {
      padding: clamp(10px, 1.5vh, 14px) 0 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      margin-bottom: clamp(16px, 2.5vh, 24px)
    }

    /* Bottom nav */
    .bnav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: clamp(58px, 8vh, 68px);
      background: rgba(8, 11, 18, .95);
      backdrop-filter: blur(24px);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 0 4px env(safe-area-inset-bottom, 0px);
      z-index: 200
    }

    .ntab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 4px;
      cursor: pointer;
      background: none;
      border: none;
      text-decoration: none;
      color: inherit
    }

    .ntab svg {
      width: clamp(19px, 2.8vw, 22px);
      height: clamp(19px, 2.8vw, 22px);
      stroke: var(--text3);
      fill: none;
      stroke-width: 1.5
    }

    .ntab.active svg {
      stroke: var(--ton)
    }

    .nt-lbl {
      font-size: clamp(9px, 1.5vw, 11px);
      font-weight: 600;
      color: var(--text3)
    }

    .ntab.active .nt-lbl {
      color: var(--ton)
    }

    .ntab.active::before {
      content: '';
      position: absolute;
      top: 0;
      width: 18px;
      height: 2px;
      background: var(--ton);
      border-radius: 2px
    }

    /* Responsive */
    @media(max-width:767px) {

      .sidebar,
      .topbar {
        display: none
      }

      .bnav {
        display: flex
      }

      .content {
        padding-bottom: calc(clamp(58px, 8vh, 68px) + 16px + env(safe-area-inset-bottom, 0px))
      }
    }

    @media(min-width:768px) {
      .sidebar {
        display: flex
      }

      .topbar {
        display: flex
      }

      .bnav {
        display: none
      }

      .mob-hdr {
        display: none
      }
    }

    @media(min-width:1440px) {
      :root {
        --sw: 250px
      }
    }

    /* Cards page styles */
    .bigcard {
      width: 100%;
      height: clamp(165px, 22vh, 215px);
      border-radius: clamp(16px, 2vw, 24px);
      padding: clamp(18px, 2.5vh, 26px) clamp(18px, 2vw, 24px);
      position: relative;
      overflow: hidden;
      margin-bottom: clamp(12px, 1.8vh, 18px);
      background: linear-gradient(145deg, #050d1f 0%, #0a1836 40%, #0c1e4a 70%, #07112a 100%);
      border: 1px solid rgba(0, 152, 234, 0.22)
    }

    .bigcard::before {
      content: '';
      position: absolute;
      top: -60px;
      right: -50px;
      width: clamp(150px, 18vw, 215px);
      height: clamp(150px, 18vw, 215px);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.055)
    }

    .bigcard::after {
      content: '';
      position: absolute;
      bottom: -55px;
      left: -30px;
      width: clamp(120px, 15vw, 180px);
      height: clamp(120px, 15vw, 180px);
      border-radius: 50%;
      background: rgba(0, 152, 234, 0.04)
    }

    .bc-lbl {
      font-size: clamp(9px, 0.75vw, 10px);
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #fff;
      opacity: .38
    }

    .bc-bal {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(30px, 4.5vw, 52px);
      font-weight: 500;
      letter-spacing: -2px;
      margin-top: clamp(10px, 1.5vh, 16px);
      color: #fff;
      position: relative;
      z-index: 1
    }

    .bc-num {
      font-size: clamp(12px, 1.1vw, 15px);
      letter-spacing: 5px;
      font-weight: 500;
      color: #fff;
      opacity: .38;
      margin-top: clamp(8px, 1.2vh, 14px);
      position: relative;
      z-index: 1
    }

    .bc-logo {
      position: absolute;
      bottom: clamp(14px, 2vh, 20px);
      right: clamp(14px, 1.8vw, 20px);
      z-index: 2;
      opacity: .58
    }

    .cacts {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(8px, 1vw, 12px);
      margin-bottom: clamp(12px, 1.8vh, 18px)
    }

    .cact {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: clamp(10px, 1.2vw, 14px);
      padding: clamp(10px, 1.4vh, 14px) 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(5px, 0.7vh, 7px);
      cursor: pointer;
      transition: background .15s
    }

    .cact:hover {
      background: var(--card2)
    }

    .cact svg {
      width: clamp(15px, 1.6vw, 19px);
      height: clamp(15px, 1.6vw, 19px);
      stroke: var(--ton2);
      fill: none
    }

    .cact span {
      font-size: clamp(10px, 0.85vw, 12px);
      font-weight: 500;
      color: var(--text2)
    }

    .info-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: clamp(13px, 1.5vw, 19px);
      overflow: hidden
    }

    .ib-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: clamp(11px, 1.5vh, 15px) clamp(14px, 1.6vw, 20px);
      border-bottom: 1px solid var(--border)
    }

    .ib-row:last-child {
      border-bottom: none
    }

    .ibl {
      font-size: clamp(11px, 0.9vw, 13px);
      color: var(--text3)
    }

    .ibv {
      font-size: clamp(12px, 1vw, 14px);
      font-weight: 600;
      color: var(--text)
    }

    .toast {
      position: fixed;
      top: clamp(14px, 2.5vh, 22px);
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: var(--card2);
      border: 1px solid var(--border2);
      color: var(--text);
      padding: clamp(9px, 1.2vh, 12px) clamp(16px, 2vw, 22px);
      border-radius: 100px;
      z-index: 9999;
      white-space: nowrap;
      transition: transform .3s;
      box-shadow: 0 8px 32px rgba(0, 0, 0, .5)
    }

    .toast.show {
      transform: translateX(-50%) translateY(0)
    }
  </style>
</head>

<body>

  <div class="toast" id="toastEl"></div>

  <script>
    const S = { balance: 248.50, tonRate: 6.00 };
    document.getElementById('tb-bal').textContent = S.balance.toFixed(2) + ' TON';

    let _tt;
    function toast(msg) {
      clearTimeout(_tt);
      const el = document.getElementById('toastEl');
      el.textContent = msg;
      el.classList.add('show');
      _tt = setTimeout(() => el.classList.remove('show'), 2800);
    }
  </script>
